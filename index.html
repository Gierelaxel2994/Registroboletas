<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BETA Cash Technology - Registro v7</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #111827;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #333;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px;
            margin: 0 auto 40px auto;
            border-radius: 12px;
            border-top: 6px solid #e30613;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .header {
            padding: 25px 20px 10px 20px;
            text-align: center;
        }

        .logo {
            max-width: 220px;
            height: auto;
            margin-bottom: 10px;
            display: inline-block;
        }

        .header h2 {
            font-size: 1.1rem;
            text-transform: uppercase;
            color: #1f2937;
            margin: 10px 0;
            letter-spacing: 1px;
        }

        .form-body {
            padding: 10px 25px 30px 25px;
        }

        .field {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: bold;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #f9fafb;
            color: #111;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #e30613;
            background-color: #fff;
        }

        .time-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .time-row input {
            flex: 1;
        }

        textarea {
            height: 80px;
            resize: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #e30613;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
            transition: 0.2s;
        }

        button:hover {
            background-color: #c00511;
        }

        button:disabled {
            background-color: #999;
            cursor: not-allowed;
        }

        #status {
            margin-top: 20px;
            text-align: center;
            font-size: 0.9rem;
            padding: 10px;
            border-radius: 8px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.png" alt="BETA Cash Technology" class="logo">
        <h2>Reporte de Servicio</h2>
    </div>

    <div class="form-body">
        <!-- CLIENTE -->
        <div class="field">
            <label>Cliente / Empresa</label>
            <input type="text" id="cliente" placeholder="Nombre de la empresa">
        </div>

        <!-- TÉCNICO ASIGNADO -->
        <div class="field">
            <label>Técnico Asignado</label>
            <select id="tecnico">
                <option value="" disabled selected>Seleccione un técnico</option>
                <option value="Adriel Aizpurua">Adriel Aizpurua</option>
                <option value="Ellery Mendoza">Ellery Mendoza</option>
                <option value="Axel De Leon">Axel De Leon</option>
            </select>
        </div>

        <!-- TIPO DE REGISTRO -->
        <div class="field">
            <label>Tipo de Registro</label>
            <select id="tipo">
                <option value="Mantenimiento">Mantenimiento Preventivo</option>
                <option value="Incidencias">Incidencias / Fallas</option>
                <option value="Capacitación">Capacitación Técnica</option>
            </select>
        </div>

        <!-- S/N -->
        <div class="field">
            <label>Número de Serie (S/N)</label>
            <input type="text" id="sn" placeholder="Ingrese el S/N del equipo">
        </div>

        <!-- FECHA -->
        <div class="field">
            <label>Fecha de Visita</label>
            <input type="date" id="fecha">
        </div>

        <!-- HORARIO -->
        <div class="field">
            <label>Rango Horario</label>
            <div class="time-row">
                <input type="time" id="h_inicio">
                <span>a</span>
                <input type="time" id="h_fin">
            </div>
        </div>

        <!-- DESCRIPCIÓN -->
        <div class="field">
            <label>Descripción del Trabajo</label>
            <textarea id="descripcion" placeholder="Describa el trabajo realizado..."></textarea>
        </div>

        <button id="btn-enviar">Guardar Reporte</button>

        <div id="status"></div>
    </div>
</div>

<script>
    const URL = "https://ghzfpwgkwtvsdzdbmebn.supabase.co/rest/v1/registros_visitas";
    const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdoemZwd2drd3R2c2R6ZGJtZWJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODQ1ODMsImV4cCI6MjA4OTg2MDU4M30.96vlwGH-jfUbEwHeWm0VjFViLtRta19NndX--NOppl8";

    const btn = document.getElementById('btn-enviar');
    const statusText = document.getElementById('status');

    btn.onclick = async function() {
        // Capturar datos
        const cliente = document.getElementById('cliente').value;
        const tecnico = document.getElementById('tecnico').value; // Nuevo campo
        const tipo = document.getElementById('tipo').value;
        const sn = document.getElementById('sn').value;
        const fecha = document.getElementById('fecha').value;
        const h1 = document.getElementById('h_inicio').value;
        const h2 = document.getElementById('h_fin').value;
        const desc = document.getElementById('descripcion').value;

        // Validar campos
        if (!cliente || !tecnico || !sn || !fecha || !h1 || !h2 || !desc) {
            alert("⚠️ Por favor rellena todos los campos incluyendo el Técnico.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "ENVIANDO...";
        statusText.style.display = "block";
        statusText.style.backgroundColor = "#eee";
        statusText.style.color = "#333";
        statusText.innerText = "⏳ Guardando datos...";

        // Objeto con los datos para enviar
        const data = {
            cliente: cliente,
            tecnico: tecnico, // Se envía a la columna 'tecnico'
            tipo: tipo,
            sn: sn,
            fecha: fecha,
            hora: h1 + " - " + h2,
            descripcion: desc
        };

        try {
            const response = await fetch(URL, {
                method: "POST",
                headers: {
                    "apikey": KEY,
                    "Authorization": "Bearer " + KEY,
                    "Content-Type": "application/json",
                    "Prefer": "return=minimal"
                },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                statusText.style.backgroundColor = "#dcfce7";
                statusText.style.color = "#166534";
                statusText.innerText = "✅ REPORTE GUARDADO CON ÉXITO";
                
                // Limpiar campos
                document.getElementById('cliente').value = "";
                document.getElementById('tecnico').selectedIndex = 0;
                document.getElementById('sn').value = "";
                document.getElementById('fecha').value = "";
                document.getElementById('h_inicio').value = "";
                document.getElementById('h_fin').value = "";
                document.getElementById('descripcion').value = "";
            } else {
                throw new Error();
            }

        } catch (e) {
            statusText.style.backgroundColor = "#fee2e2";
            statusText.style.color = "#991b1b";
            statusText.innerText = "❌ ERROR AL GUARDAR";
        } finally {
            btn.disabled = false;
            btn.innerText = "Guardar Reporte";
        }
    };
</script>

</body>
</html>
