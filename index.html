<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BETA Cash Technology - Registro</title>
    <style>
        :root {
            --primary-red: #e30613;
            --dark-bg: #111827;
            --card-bg: #ffffff;
            --text-main: #1f2937;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            /* Fondo con degradado */
            background-image: radial-gradient(circle at top, #1f2937 0%, #111827 100%);
            margin: 0;
            padding: 20px 10px; /* Espacio para que no toque los bordes */
            display: flex;
            justify-content: center;
            align-items: flex-start; /* IMPORTANTE: Alinea al inicio para permitir scroll */
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 450px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            margin-bottom: 40px; /* Espacio extra al final */
        }

        .header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 4px solid var(--primary-red);
        }

        .logo {
            max-width: 220px;
            height: auto;
            margin-bottom: 10px;
        }

        .header h2 {
            margin: 10px 0 0 0;
            color: var(--text-main);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-body {
            padding: 25px;
        }

        .field {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: bold;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            color: #111;
            box-sizing: border-box;
            background: #f9fafb;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-red);
            background: white;
            box-shadow: 0 0 0 3px rgba(227, 6, 19, 0.1);
        }

        .time-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .time-row input {
            flex: 1;
        }

        textarea {
            resize: none;
            min-height: 80px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--primary-red);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #c00511;
            transform: translateY(-2px);
        }

            background: #9ca3af;
