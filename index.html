<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BETA Cash Technology - Registro Técnico</title>
    <style>
        :root {
            --primary-red: #e30613; /* Rojo corporativo */
            --dark-bg: #111827;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --input-border: #d1d5db;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at top right, #1f2937, #111827);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            padding: 40px 20px 20px 20px;
            text-align: center;
            background: #fff;
        }

        /* ESTA ES LA RUTA PARA GITHUB */
        .logo {
            max-width: 250px;
            height: auto;
            display: block;
            margin: 0 auto 15px auto;
        }

        .header h2 {
            margin: 10px 0 0 0;
            color: var(--text-main);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
            border-top: 2px solid #eee;
            padding-top: 15px;
            display: inline-block;
        }

        .form-body {
            padding: 0 35px 35px 35px;
        }

        .field-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            color: #6b7280;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--input-border);
            border-radius: 10px;
            font-size: 0.95rem;
            color: var(--text-main);
            background-color: #f9fafb;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-red);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(227, 6, 19, 0.1);
        }

        .time-container {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .time-container input {
            flex: 1;
        }

        .time-separator {
            font-weight: 900;
            color: #9ca3af;
        }

        textarea {
            resize: none;
            min-height: 80px;
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-red);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 6px -1px rgba(227, 6, 19, 0.2);
        }

        button:hover {
            background-color: #c00511;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(227, 6, 19, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }

        #status {
            margin-top: 20px;
            text-align: center;
            font-size: 0.85rem;
            padding: 12px;
            border-radius: 10px;
            display: none;
            font-weight: 600;
        }

        /* Estados de respuesta */
        .success { background-color: #d1fae5; color: #065f46; display: block !important; border: 1px solid #6ee7b7; }
        .error { background-color: #fee2e2; color: #991b1b; display: block !important; border: 1px solid #fca5a5; }
        .loading { background-color: #f3f4f6; color: #1f2937; display: block !important; border: 1px solid #d1d5db; }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <!-- RUTA RELATIVA PARA GITHUB -->
        <img src="logo.png" alt="BETA Cash Technology" class="logo">
        <br>
        <h2>Reporte Técnico</h2>
    </div>

    <div class="form-body">
        <div class="field-group">
            <label>Cliente / Empresa</label>
            <input type="text" id="cliente" placeholder="Nombre del cliente">
        </div>

        <div class="field-group">
