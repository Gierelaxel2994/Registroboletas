<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BETA Cash Technology - Registro v8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; padding: 20px; background-color: #111827; font-family: 'Segoe UI', Arial, sans-serif; color: #333; }
        .container { background-color: #ffffff; width: 100%; max-width: 450px; margin: 0 auto 40px auto; border-radius: 12px; border-top: 6px solid #e30613; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; transition: all 0.3s; }
        .header { padding: 25px 20px 10px 20px; text-align: center; }
        .logo { max-width: 220px; height: auto; margin-bottom: 10px; display: inline-block; cursor: pointer; user-select: none; -webkit-user-drag: none; }
        .header h2 { font-size: 1.1rem; text-transform: uppercase; color: #1f2937; margin: 10px 0; letter-spacing: 1px; }
        .form-body { padding: 10px 25px 30px 25px; }
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; font-weight: bold; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; box-sizing: border-box; background-color: #f9fafb; color: #111; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #e30613; background-color: #fff; }
        .time-row { display: flex; gap: 10px; align-items: center; }
        textarea { height: 80px; resize: none; }
        .btn-principal { width: 100%; padding: 15px; background-color: #e30613; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.2s; }
        .btn-principal:hover { background-color: #c00511; }
        #status { margin-top: 20px; text-align: center; font-size: 0.9rem; padding: 10px; border-radius: 8px; display: none; font-weight: bold; }

        /* Estilos Admin */
        #admin-modal, #pin-modal { display: none; position: fixed; inset: 0; z-index: 1000; align-items: center; justify-content: center; padding: 10px; }
        .modal-overlay { position: absolute; inset: 0; background: rgba(17, 24, 39, 0.95); backdrop-blur: 5px; }
        .pin-dot { width: 14px; height: 14px; border: 2px solid #4b5563; border-radius: 50%; transition: 0.2s; }
        .pin-dot.filled { background: #e30613; border-color: #e30613; transform: scale(1.2); }
        .num-btn { width: 60px; height: 60px; border-radius: 50%; background: #1f2937; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #374151; }
        .num-btn:active { background: #e30613; }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div class="header">
        <img src="logo.png" alt="BETA Cash Technology" class="logo" id="beta-logo">
        <h2>Reporte de Servicio</h2>
    </div>

    <div class="form-body">
        <div class="field"><label>Cliente / Empresa</label><input type="text" id="cliente" placeholder="Nombre de la empresa"></div>
        <div class="field">
            <label>Técnico Asignado</label>
            <select id="tecnico">
                <option value="" disabled selected>Seleccione un técnico</option>
                <option>Adriel Aizpurua</option><option>Ellery Mendoza</option><option>Axel De Leon</option>
            </select>
        </div>
        <div class="field">
            <label>Tipo de Registro</label>
            <select id="tipo">
                <option value="Mantenimiento">Mantenimiento Preventivo</option>
                <option value="Incidencias">Incidencias / Fallas</option>
                <option value="Capacitación">Capacitación Técnica</option>
            </select>
        </div>
        <div class="field"><label>Número de Serie (S/N)</label><input type="text" id="sn" placeholder="S/N del equipo"></div>
        <div class="field"><label>Fecha de Visita</label><input type="date" id="fecha"></div>
        <div class="field">
            <label>Rango Horario</label>
            <div class="time-row"><input type="time" id="h_inicio"><span>a</span><input type="time" id="h_fin"></div>
        </div>
        <div class="field"><label>Descripción del Trabajo</label><textarea id="descripcion" placeholder="Detalle el trabajo..."></textarea></div>
        <button id="btn-enviar" class="btn-principal">Guardar Reporte</button>
        <div id="status"></div>
    </div>
</div>

<div id="pin-modal">
    <div class="modal-overlay"></div>
    <div class="relative bg-gray-900 p-8 rounded-3xl border border-gray-700 w-80 text-center">
        <h3 class="text-white font-bold mb-6 tracking-widest">ACCESO ADMIN</h3>
        <div class="flex justify-center gap-4 mb-8">
            <div class="pin-dot" id="dot-0"></div><div class="pin-dot" id="dot-1"></div><div class="pin-dot" id="dot-2"></div><div class="pin-dot" id="dot-3"></div>
        </div>
        <div class="grid grid-cols-3 gap-4 place-items-center">
            <button onclick="pressPin('1')" class="num-btn">1</button><button onclick="pressPin('2')" class="num-btn">2</button><button onclick="pressPin('3')" class="num-btn">3</button>
            <button onclick="pressPin('4')" class="num-btn">4</button><button onclick="pressPin('5')" class="num-btn">5</button><button onclick="pressPin('6')" class="num-btn">6</button>
            <button onclick="pressPin('7')" class="num-btn">7</button><button onclick="pressPin('8')" class="num-btn">8</button><button onclick="pressPin('9')" class="num-btn">9</button>
            <button onclick="clearPin()" class="num-btn text-xs text-red-500">BORRAR</button><button onclick="pressPin('0')" class="num-btn">0</button><button onclick="closeModals()" class="num-btn text-xs text-gray-500">SALIR</button>
        </div>
    </div>
</div>

<div id="admin-modal">
    <div class="modal-overlay"></div>
    <div class="relative bg-white w-full max-w-6xl h-[90vh] rounded-2xl flex flex-col overflow-hidden shadow-2xl">
        <div class="bg-gray-900 p-6 flex justify-between items-center text-white">
            <h2 class="text-xl font-bold italic">BETA <span class="text-red-600">ADMIN DASHBOARD</span></h2>
            <button onclick="closeModals()" class="text-2xl">&times;</button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4 bg-gray-50">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div><label class="text-[10px] font-black text-gray-400">FILTRAR CLIENTE</label><input type="text" id="f-cliente" oninput="loadDashboard()" placeholder="Buscar empresa..." class="!py-2 !text-sm"></div>
                <div><label class="text-[10px] font-black text-gray-400">POR S/N</label><input type="text" id="f-sn" oninput="loadDashboard()" placeholder="Serie..." class="!py-2 !text-sm"></div>
                <div>
                    <label class="text-[10px] font-black text-gray-400">POR TÉCNICO</label>
                    <select id="f-tecnico" onchange="loadDashboard()" class="!py-2 !text-sm">
                        <option value="">Todos</option><option>Adriel Aizpurua</option><option>Ellery Mendoza</option><option>Axel De Leon</option>
                    </select>
                </div>
                <div><label class="text-[10px] font-black text-gray-400">POR FECHA</label><input type="date" id="f-fecha" onchange="loadDashboard()" class="!py-2 !text-sm"></div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
                <div class="lg:col-span-2 bg-white p-4 rounded-xl shadow-sm border border-gray-200 h-64">
                    <canvas id="adminChart"></canvas>
                </div>
                <div class="bg-red-600 p-6 rounded-xl shadow-lg flex flex-col justify-center items-center text-white">
                    <span id="total-count" class="text-5xl font-black">0</span>
                    <p class="uppercase text-xs font-bold mt-2 opacity-80">Registros Encontrados</p>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-gray-100 text-gray-600 uppercase text-[10px] font-bold">
                            <tr>
                                <th class="p-4">Fecha</th><th class="p-4">Cliente</th><th class="p-4">S/N</th><th class="p-4">Técnico</th><th class="p-4">Tipo</th><th class="p-4">Descripción</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const URL = "https://ghzfpwgkwtvsdzdbmebn.supabase.co/rest/v1/registros_visitas";
    const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdoemZwd2drd3R2c2R6ZGJtZWJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODQ1ODMsImV4cCI6MjA4OTg2MDU4M30.96vlwGH-jfUbEwHeWm0VjFViLtRta19NndX--NOppl8";

    // --- ACCESO OCULTO ---
    let timer;
    let pin = "";
    const MASTER_PIN = "2026";
    const logo = document.getElementById('beta-logo');

    logo.onmousedown = () => timer = setTimeout(showPinModal, 2000);
    logo.onmouseup = () => clearTimeout(timer);
    logo.ontouchstart = (e) => { e.preventDefault(); timer = setTimeout(showPinModal, 2000); };
    logo.ontouchend = () => clearTimeout(timer);

    function showPinModal() { pin = ""; updateDots(); document.getElementById('pin-modal').style.display = 'flex'; }
    function closeModals() { document.getElementById('pin-modal').style.display = 'none'; document.getElementById('admin-modal').style.display = 'none'; }

    function pressPin(n) {
        if(pin.length < 4) {
            pin += n;
            updateDots();
            if(pin.length === 4) {
                if(pin === MASTER_PIN) {
                    document.getElementById('pin-modal').style.display = 'none';
                    document.getElementById('admin-modal').style.display = 'flex';
                    loadDashboard();
                } else {
                    alert("PIN INCORRECTO");
                    pin = ""; updateDots();
                }
            }
        }
    }
    function updateDots() { for(let i=0; i<4; i++) document.getElementById(`dot-${i}`).classList.toggle('filled', i < pin.length); }
    function clearPin() { pin = ""; updateDots(); }

    // --- LÓGICA DASHBOARD ---
    let myChart = null;

    async function loadDashboard() {
        const fClie = document.getElementById('f-cliente').value.toLowerCase();
        const fSn = document.getElementById('f-sn').value.toLowerCase();
        const fTech = document.getElementById('f-tecnico').value;
        const fDate = document.getElementById('f-fecha').value;

        try {
            const response = await fetch(URL + "?order=fecha.desc", {
                headers: { "apikey": KEY, "Authorization": "Bearer " + KEY }
            });
            const allData = await response.json();

            // Filtrado local
            const filtered = allData.filter(item => {
                return (!fClie || item.cliente.toLowerCase().includes(fClie)) &&
                       (!fSn || item.sn.toLowerCase().includes(fSn)) &&
                       (!fTech || item.tecnico === fTech) &&
                       (!fDate || item.fecha === fDate);
            });

            document.getElementById('total-count').innerText = filtered.length;
            renderTable(filtered);
            renderChart(filtered);
        } catch (e) { console.error("Error cargando Dashboard", e); }
    }

    function renderTable(data) {
        const body = document.getElementById('admin-table-body');
        body.innerHTML = data.map(item => `
            <tr class="hover:bg-gray-50 border-b border-gray-100">
                <td class="p-4 font-bold text-gray-500">${item.fecha}</td>
                <td class="p-4 font-black uppercase text-gray-800">${item.cliente}</td>
                <td class="p-4"><span class="bg-gray-200 px-2 py-1 rounded text-[10px] font-bold">${item.sn}</span></td>
                <td class="p-4 text-gray-600 font-semibold">${item.tecnico}</td>
                <td class="p-4 text-xs italic">${item.tipo}</td>
                <td class="p-4 text-xs text-gray-400 max-w-xs truncate">${item.descripcion}</td>
            </tr>
        `).join('');
    }

    function renderChart(data) {
        const ctx = document.getElementById('adminChart').getContext('2d');
        const stats = {};
        data.forEach(i => stats[i.tecnico] = (stats[i.tecnico] || 0) + 1);

        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(stats),
                datasets: [{
                    label: 'Servicios Realizados',
                    data: Object.values(stats),
                    backgroundColor: '#e30613',
                    borderRadius: 8
                }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    // --- ENVÍO DE DATOS (Mantiene tu lógica original) ---
    const btn = document.getElementById('btn-enviar');
    const statusText = document.getElementById('status');

    btn.onclick = async function() {
        const data = {
            cliente: document.getElementById('cliente').value,
            tecnico: document.getElementById('tecnico').value,
            tipo: document.getElementById('tipo').value,
            sn: document.getElementById('sn').value,
            fecha: document.getElementById('fecha').value,
            hora: document.getElementById('h_inicio').value + " - " + document.getElementById('h_fin').value,
            descripcion: document.getElementById('descripcion').value
        };

        if (!data.cliente || !data.tecnico || !data.sn || !data.fecha || !data.descripcion) {
            alert("⚠️ Por favor rellena todos los campos.");
            return;
        }

        btn.disabled = true; btn.innerText = "ENVIANDO...";
        statusText.style.display = "block";
        statusText.innerText = "⏳ Guardando...";

        try {
            const response = await fetch(URL, {
                method: "POST",
                headers: { "apikey": KEY, "Authorization": "Bearer " + KEY, "Content-Type": "application/json", "Prefer": "return=minimal" },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                statusText.style.backgroundColor = "#dcfce7";
                statusText.style.color = "#166534";
                statusText.innerText = "✅ REPORTE GUARDADO CON ÉXITO";
                document.querySelectorAll('input, textarea').forEach(el => el.value = "");
                document.querySelectorAll('select').forEach(el => el.selectedIndex = 0);
            } else { throw new Error(); }
        } catch (e) {
            statusText.style.backgroundColor = "#fee2e2";
            statusText.innerText = "❌ ERROR AL GUARDAR";
        } finally {
            btn.disabled = false; btn.innerText = "Guardar Reporte";
        }
    };
</script>
</body>
</html>
